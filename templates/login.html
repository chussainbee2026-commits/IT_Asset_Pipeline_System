<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="form-box">

    <h2>IT Asset Management Login</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button class="btn">
            Login
        </button>

    </form>

    <p>

        Don't have account?

        <a href="{{ url_for('register') }}">
            Register
        </a>

    </p>

</div>

</body>
</html>
